spring:
  application:
    name: boardgame-tracker
  cache:
    type: redis
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
s3:
  base-s3-url: ""
app:
  cache:
    user-collection-stats-ttl: ${USER_COLLECTION_STATS_CACHE_TTL:10m}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  security:
    jwt:
      issuer: boardgame-tracker
      access-token-ttl-seconds: 3600
      refresh-token-ttl-seconds: 2592000
      secret: ${JWT_SECRET:change-me-please-change-me-please}
api:
  bgg:
    token: ${BGG_API_TOKEN}
    base-url: https://boardgamegeek.com/xmlapi2
    request-timeout-seconds: 30
    min-delay-millis: 5000
    retry-max-attempts: 5
