type: object
required: [type, originalName, displayName, isCustom, tags]
properties:
  bggId:
    type: integer
    format: int64
    nullable: true
    example: 174430
  type:
    # TODO: Может здесь стоит использовать enum?
    type: string
    default: BOARDGAME
    example: BOARDGAME
  originalName:
    type: string
    maxLength: 500
    example: "Gloomhaven"
  displayName:
    type: string
    maxLength: 500
    example: "Мрачная гавань"
  complexity:
    type: number
    format: double
    nullable: true
    example: 3.91
  minPlayers:
    type: integer
    nullable: true
    example: 1
  maxPlayers:
    type: integer
    nullable: true
    example: 4
  playingTime:
    type: integer
    nullable: true
    example: 120
  minPlayTime:
    type: integer
    nullable: true
    example: 60
  maxPlayTime:
    type: integer
    nullable: true
    example: 120
  minAge:
    type: integer
    nullable: true
    example: 14
  yearPublished:
    type: integer
    nullable: true
    example: 2017
  s3ImageKey:
    type: string
    maxLength: 500
    nullable: true
    example: "boardgames/1/image.jpg"
  s3PreviewKey:
    type: string
    maxLength: 500
    nullable: true
    example: "boardgames/1/preview.jpg"
  bggImageUrl:
    type: string
    nullable: true
    example: "https://cf.geekdo-images.com/image.jpg"
  bggPreviewUrl:
    type: string
    nullable: true
    example: "https://cf.geekdo-images.com/preview.jpg"
  isCustom:
    type: boolean
    default: false
    example: false
  createdById:
    type: integer
    format: int64
    nullable: true
    example: 42
  tags:
    type: array
    items:
      $ref: "./Tag.yaml"
    example: []
