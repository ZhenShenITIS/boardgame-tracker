type: object
required: [dateStart]
properties:
  dateStart:
    type: string
    format: date-time
    example: "2026-05-16T09:00:00Z"
  dateEnd:
    type: string
    format: date-time
    nullable: true
    example: "2026-05-16T10:30:00Z"
  comment:
    type: string
    nullable: true
    maxLength: 2000
    example: "Отличная партия"
