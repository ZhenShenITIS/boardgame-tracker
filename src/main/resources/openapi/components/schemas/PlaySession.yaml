type: object
required: [id, collectionItemId, dateStart, createdAt, updatedAt]
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    example: 1
  collectionItemId:
    type: integer
    format: int64
    readOnly: true
    example: 42
  dateStart:
    type: string
    format: date-time
    example: "2026-05-16T09:00:00Z"
  dateEnd:
    type: string
    format: date-time
    nullable: true
    example: "2026-05-16T10:30:00Z"
  comment:
    type: string
    nullable: true
    maxLength: 2000
    example: "Играли вчетвером"
  createdAt:
    type: string
    format: date-time
    readOnly: true
    example: "2026-05-16T09:00:00Z"
  updatedAt:
    type: string
    format: date-time
    readOnly: true
    example: "2026-05-16T09:00:00Z"
