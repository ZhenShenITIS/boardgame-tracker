get:
  summary: Получить игровую сессию по id
  tags: [ play-sessions ]
  parameters:
    - $ref: "../components/parameters/intIdInPath.yaml"
  responses:
    200:
      description: Игровая сессия
      content:
        application/json:
          schema:
            $ref: '../components/schemas/PlaySession.yaml'
    400:
      $ref: '../components/responses/BadRequest.yaml'
    401:
      $ref: '../components/responses/UnauthorizedError.yaml'
    404:
      $ref: '../components/responses/NotFound.yaml'

put:
  summary: Обновить игровую сессию
  tags: [ play-sessions ]
  parameters:
    - $ref: "../components/parameters/intIdInPath.yaml"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/UpdatePlaySessionRequest.yaml'
  responses:
    200:
      description: Игровая сессия обновлена
      content:
        application/json:
          schema:
            $ref: '../components/schemas/PlaySession.yaml'
    400:
      $ref: '../components/responses/BadRequest.yaml'
    401:
      $ref: '../components/responses/UnauthorizedError.yaml'
    404:
      $ref: '../components/responses/NotFound.yaml'

delete:
  summary: Удалить игровую сессию
  tags: [ play-sessions ]
  parameters:
    - $ref: "../components/parameters/intIdInPath.yaml"
  responses:
    204:
      description: Игровая сессия удалена
    400:
      $ref: '../components/responses/BadRequest.yaml'
    401:
      $ref: '../components/responses/UnauthorizedError.yaml'
    404:
      $ref: '../components/responses/NotFound.yaml'
