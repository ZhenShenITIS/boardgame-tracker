post:
  summary: Выход из системы
  tags: [ auth ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/LogoutRequest.yaml'
  responses:
    '200':
      description: Успешный выход из системы
    401:
      $ref: '../components/responses/UnauthorizedError.yaml'
    '429':
      $ref: '../components/responses/TooManyRequests.yaml'