get:
  summary: Подобрать игры на вечер из коллекции пользователя
  tags: [ recommendations ]
  parameters:
    - name: playerCount
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
    - name: maxPlayTimeMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    - name: shelfOfShameOnly
      in: query
      required: false
      schema:
        type: boolean
        default: false
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 50
  responses:
    200:
      description: Рекомендации игр на вечер
      content:
        application/json:
          schema:
            $ref: '../components/schemas/GameRecommendationList.yaml'
    400:
      $ref: '../components/responses/BadRequest.yaml'
    401:
      $ref: '../components/responses/UnauthorizedError.yaml'
