post:
  summary: Смена пароля
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/ChangePasswordRequest.yaml'
  responses:
    '200':
      description: Успешная смена пароля
      content:
        application/json:
          schema:
            $ref: '../components/schemas/AuthResponse.yaml'
    '401':
      $ref: '../components/responses/UnauthorizedError.yaml'
    '429':
      $ref: '../components/responses/TooManyRequests.yaml'