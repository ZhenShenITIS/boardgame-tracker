get:
  summary: Получить элемент коллекции пользователя
  tags: [ collection-items ]
  parameters:
    - $ref: "../components/parameters/intIdInPath.yaml"
  responses:
    200:
      description: Элемент коллекции
      content:
        application/json:
          schema:
            $ref: '../components/schemas/CollectionItem.yaml'
    400:
      $ref: '../components/responses/BadRequest.yaml'
    401:
      $ref: '../components/responses/UnauthorizedError.yaml'
    404:
      $ref: '../components/responses/NotFound.yaml'

put:
  summary: Обновить элемент коллекции пользователя
  tags: [ collection-items ]
  parameters:
    - $ref: "../components/parameters/intIdInPath.yaml"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/UpdateCollectionItemRequest.yaml'
  responses:
    200:
      description: Элемент коллекции обновлен
      content:
        application/json:
          schema:
            $ref: '../components/schemas/CollectionItem.yaml'
    400:
      $ref: '../components/responses/BadRequest.yaml'
    401:
      $ref: '../components/responses/UnauthorizedError.yaml'
    404:
      $ref: '../components/responses/NotFound.yaml'

delete:
  summary: Удалить элемент коллекции пользователя
  tags: [ collection-items ]
  parameters:
    - $ref: "../components/parameters/intIdInPath.yaml"
  responses:
    204:
      description: Элемент коллекции удалён
    400:
      $ref: '../components/responses/BadRequest.yaml'
    401:
      $ref: '../components/responses/UnauthorizedError.yaml'
    404:
      $ref: '../components/responses/NotFound.yaml'
