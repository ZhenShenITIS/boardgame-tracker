services:
  db:
    image: postgres:17
    container_name: boardgame_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: boardgame_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: boardgame_tomcat
    restart: unless-stopped
    ports:
      - "8088:8080"
    depends_on:
      - db
      - redis
    env_file:
      - .env

volumes:
  pgdata:
